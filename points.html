<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Pontos" />
  <title>Pontuação · Hábitos</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="./icons/icon.svg" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <!-- Tela de login (sobreposta a tudo até autenticar) -->
  <div id="auth-gate" class="auth-gate">
    <div class="auth-card">
      <h1 class="auth-title">Hábitos</h1>
      <p class="auth-sub">login pra continuar</p>
      <p id="auth-loading" class="auth-loading">verificando…</p>
      <button id="btn-google-login" class="auth-btn" hidden>
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Entrar com Google
      </button>
      <div id="auth-error" class="auth-error" hidden></div>
    </div>
  </div>

  <header class="topbar">
    <a href="./" class="ghost-btn" aria-label="Voltar">‹ voltar</a>
    <h1 class="brand">Pontuação</h1>
    <span class="topbar-date" id="period-info"></span>
  </header>

  <main class="page">
    <section class="block">
      <div class="block-head">
        <h2>Pontos atuais</h2>
      </div>
      <div id="totals" class="totals-grid">
        <p class="muted" style="padding:8px">carregando…</p>
      </div>
    </section>

    <section class="block">
      <div class="block-head">
        <h2>Detalhamento por pessoa</h2>
        <select id="breakdown-period" class="select">
          <option value="weekly" selected>semana</option>
          <option value="monthly">mês</option>
          <option value="all">total</option>
        </select>
      </div>
      <div id="breakdown" class="two-col">
        <p class="muted" style="padding:8px">carregando…</p>
      </div>
      <div id="breakdown-combined" class="breakdown-combined"></div>
    </section>

    <section class="block">
      <div class="block-head">
        <h2>Prêmios</h2>
        <span class="muted" style="font-size:11px">soma dos dois</span>
      </div>
      <div id="rewards" class="rewards-list">
        <p class="muted" style="padding:8px">carregando…</p>
      </div>
    </section>

    <section class="block">
      <div class="block-head">
        <h2>Recordes</h2>
        <span class="muted" style="font-size:11px">melhor desempenho de cada um</span>
      </div>
      <div id="records-banner" class="records-banner"></div>
      <div id="records" class="two-col">
        <p class="muted" style="padding:8px">carregando…</p>
      </div>
    </section>

    <footer class="footer">
      <span class="muted">edite <code>js/points-config.js</code> pra mudar pontos e prêmios</span>
      <span id="auth-info" class="muted"></span>
    </footer>
  </main>

  <script type="module" src="./js/points-page.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
