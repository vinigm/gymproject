<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Pontos" />
  <title>Pontuação · Hábitos</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="./icons/icon.svg" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <header class="topbar">
    <a href="./" class="ghost-btn" aria-label="Voltar">‹ voltar</a>
    <h1 class="brand">Pontuação</h1>
    <span class="topbar-date" id="period-info"></span>
  </header>

  <main class="page">
    <section class="block">
      <div class="block-head">
        <h2>Pontos atuais</h2>
      </div>
      <div id="totals" class="totals-grid">
        <p class="muted" style="padding:8px">carregando…</p>
      </div>
    </section>

    <section class="block">
      <div class="block-head">
        <h2>Prêmios</h2>
        <span class="muted" style="font-size:11px">soma dos dois</span>
      </div>
      <div id="rewards" class="rewards-list">
        <p class="muted" style="padding:8px">carregando…</p>
      </div>
    </section>

    <footer class="footer">
      <span class="muted">edite <code>js/points-config.js</code> pra mudar pontos e prêmios</span>
    </footer>
  </main>

  <script type="module" src="./js/points-page.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
