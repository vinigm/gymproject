<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Dumbbell -->
  <g stroke="url(#accent)" stroke-width="34" stroke-linecap="round" fill="none">
    <line x1="120" y1="256" x2="392" y2="256"/>
  </g>
  <g fill="url(#accent)">
    <rect x="84"  y="186" width="46" height="140" rx="16"/>
    <rect x="382" y="186" width="46" height="140" rx="16"/>
    <rect x="56"  y="216" width="36" height="80"  rx="12"/>
    <rect x="420" y="216" width="36" height="80"  rx="12"/>
  </g>
  <!-- Check -->
  <path d="M180 360 l46 46 l108 -120" stroke="#34d399" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
